<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
              <title>Sign Up | SkillBridge</title>
                  <link rel="stylesheet" href="styles.css" />
                    </head>
                      <body>

                          <!-- NAVBAR -->
                              <nav class="navbar">
                                    <h1 class="logo"><a href="index.html">Skill<span>Bridge</span></a></h1>
                                          <ul>
                                                  <li><a href="index.html">Home</a></li>
                                                          <li><a href="#">Listings</a></li>
                                                                  <li><a href="signup.html">Sign Up</a></li>
                                                                        </ul>
                                                                            </nav>

                                                                                <!-- SIGNUP SECTION -->
                                                                                    <section class="signup-section">
                                                                                          <div class="signup-box">
                                                                                                  <h2>Join <span>SkillBridge</span></h2>
                                                                                                          <p class="subtitle">Create your free account today</p>

                                                                                                                  <div class="input-group">
                                                                                                                            <label>Full Name</label>
                                                                                                                                      <input type="text" placeholder="Enter your full name" />
                                                                                                                                              </div>

                                                                                                                                                      <div class="input-group">
                                                                                                                                                                <label>Email Address</label>
                                                                                                                                                                          <input type="email" placeholder="Enter your email" />
                                                                                                                                                                                  </div>

                                                                                                                                                                                          <div class="input-group">
                                                                                                                                                                                                    <label>Password</label>
                                                                                                                                                                                                              <input type="password" placeholder="Create a password" />
                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                              <div class="input-group">
                                                                                                                                                                                                                                        <label>I want to...</label>
                                                                                                                                                                                                                                                  <select>
                                                                                                                                                                                                                                                              <option value="">Select an option</option>
                                                                                                                                                                                                                                                                          <option value="offer">Offer My Skills</option>
                                                                                                                                                                                                                                                                                      <option value="find">Find Work / Hire</option>
                                                                                                                                                                                                                                                                                                </select>
                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                <button class="btn signup-btn">Create Account</button>

                                                                                                                                                                                                                                                                                                                        <p class="login-link">Already have an account? 
                                                                                                                                                                                                                                                                                                                                  <a href="#">Log In</a>
                                                                                                                                                                                                                                                                                                                                          </p>
                                                                                                                                                             </div>
                                                                                                                                                                                                                                  </section>

                                                                                                                          <script src="script.js"></script>
                                                                                                        </body>
                                                                 </html>
